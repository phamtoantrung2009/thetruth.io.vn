name = "thetruth-io-vn"
pages_build_output_dir = "_site"

[[d1_databases]]
binding = "DB"
database_name = "thetruth-subscribers"
database_id = "575326b2-7326-46ef-9827-0622a61bfb46"

[[kv_namespaces]]
binding = "SUBSCRIBERS_KV"
id = "c7d23f66c10544878327f072448d2adf"

[vars]
SITE_URL = "https://thetruth.io.vn"

# REQUIRED SECRETS — do NOT put these in [vars] (they'd be visible in plaintext).
# Set via Wrangler CLI (run once, stored encrypted in Cloudflare):
#
#   wrangler secret put RESEND_API_KEY   → paste your re_... key
#   wrangler secret put OWNER_EMAIL      → e.g. you@thetruth.io.vn
#
# Verify secrets are set: wrangler secret list
# Tail live logs:         wrangler tail --format=pretty
