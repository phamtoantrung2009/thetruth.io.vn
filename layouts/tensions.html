<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Căng Thẳng — THE TRUTH</title>
    <meta name="description" content="Cơ sở kiến thức về các căng thẳng hệ thống trong thực tại Việt Nam.">
    <meta property="og:title" content="Căng Thẳng — THE TRUTH">
    <meta property="og:description" content="Cơ sở kiến thức về căng thẳng hệ thống.">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://thetruth.io.vn/ten-xo.html">
    <style>
        :root {
            --bg: #0d0d0d;
            --text: #e5e5e5;
            --text-muted: #666;
            --accent: #e63946;
            --border: #262626;
            --card-bg: #141414;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }
        a { color: var(--text); text-decoration: none; }
        a:hover { color: var(--accent); }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2.5rem;
        }
        .logo { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
        .logo span { color: var(--accent); }
        nav a { 
            color: var(--text-muted); 
            margin-left: 1.5rem; 
            font-size: 0.9rem;
        }
        nav a:hover { color: var(--text); }
        
        h1 { 
            font-size: 2rem; 
            font-weight: 700; 
            margin-bottom: 1rem;
        }
        .intro { 
            color: var(--text-muted); 
            font-size: 1.05rem; 
            margin-bottom: 2.5rem;
            max-width: 560px;
        }
        
        .tension {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
            scroll-margin-top: 1rem;
        }
        .tension h2 { 
            font-size: 1.15rem; 
            font-weight: 600; 
            margin-bottom: 0.5rem;
        }
        .tension .mechanism { 
            color: #999; 
            font-size: 0.95rem; 
            margin-bottom: 0.75rem;
        }
        .tension .mechanism strong { color: var(--accent); }
        .tension .tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
        .tag { 
            background: var(--border); 
            padding: 0.15rem 0.5rem; 
            border-radius: 3px; 
            font-size: 0.7rem; 
            color: var(--text-muted);
        }
        .related-link {
            font-size: 0.85rem;
            color: var(--accent);
        }
        
        footer { 
            margin-top: 4rem; 
            padding-top: 2rem; 
            border-top: 1px solid var(--border); 
            color: var(--text-muted); 
            font-size: 0.8rem; 
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">THE TRUTH<span>.</span></a>
        <nav>
            <a href="/phan-tich">Phân tích</a>
            <a href="/ten-xo">Bản đồ nỗi đau</a>
            <a href="/ve-he-thong">Về hệ thống</a>
        </nav>
    </header>

    <main>
        <h1>Căng Thẳng Hệ Thống</h1>
        <p class="intro">Các căng thẳng cốt lõi định hình thực tại tầng lớp trung lưu Việt Nam. Mỗi căng thẳng có cơ chế. Mỗi căng thẳng có cái giá.</p>
        
        {{tensions_list}}
    </main>

    <footer>
        <p>© 2026 THE TRUTH — Giải mã thực tại hệ thống</p>
    </footer>
</body>
</html>
