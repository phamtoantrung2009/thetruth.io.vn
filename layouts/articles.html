<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân Tích — SABLE</title>
    <meta name="description" content="Tất cả bài phân tích hệ thống.">
    <meta property="og:title" content="Phân Tích — SABLE">
    <meta property="og:description" content="Tất cả bài phân tích hệ thống.">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://thetruth.io.vn/phan-tich">
    <style>
        :root {
            --bg: #0d0d0d;
            --text: #e5e5e5;
            --text-muted: #666;
            --accent: #e63946;
            --border: #262626;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }
        a { color: var(--text); text-decoration: none; }
        a:hover { color: var(--accent); }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2.5rem;
        }
        .logo { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
        .logo span { color: var(--accent); }
        nav a { 
            color: var(--text-muted); 
            margin-left: 1.5rem; 
            font-size: 0.9rem;
        }
        nav a:hover { color: var(--text); }
        
        h1 { 
            font-size: 2rem; 
            font-weight: 700; 
            margin-bottom: 0.5rem;
        }
        .subtitle { 
            color: var(--text-muted); 
            margin-bottom: 2.5rem;
        }
        
        .articles { list-style: none; }
        .articles li { margin-bottom: 2rem; }
        .articles a { display: block; }
        .articles a:hover h2 { color: var(--accent); }
        .articles h2 { 
            font-size: 1.35rem; 
            font-weight: 600; 
            margin-bottom: 0.4rem;
            transition: color 0.2s;
        }
        .articles .excerpt { color: #999; font-size: 0.95rem; margin-bottom: 0.5rem; }
        .articles .meta { color: var(--text-muted); font-size: 0.8rem; }
        .tag { 
            display: inline-block; 
            background: var(--border); 
            padding: 0.15rem 0.5rem; 
            border-radius: 3px; 
            font-size: 0.7rem; 
            margin-right: 0.4rem;
        }
        
        footer { 
            margin-top: 4rem; 
            padding-top: 2rem; 
            border-top: 1px solid var(--border); 
            color: var(--text-muted); 
            font-size: 0.8rem; 
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">SABLE<span>.</span></a>
        <nav>
            <a href="/phan-tich">Phân tích</a>
            <a href="/ten-xo">Bản đồ nỗi đau</a>
            <a href="/ve-he-thong">Về hệ thống</a>
        </nav>
    </header>

    <main>
        <h1>Tất Cả Phân Tích</h1>
        <p class="subtitle">Giải mã thực tại hệ thống cho nam giới Việt Nam 30+.</p>
        
        <ul class="articles">
            {{articles}}
        </ul>
    </main>

    <footer>
        <p>© 2026 SABLE — Giải mã thực tại hệ thống</p>
    </footer>
</body>
</html>
