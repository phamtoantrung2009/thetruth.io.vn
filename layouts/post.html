<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} — SABLE</title>
    <meta name="description" content="{{excerpt}}">
    <meta property="og:title" content="{{title}}">
    <meta property="og:description" content="{{excerpt}}">
    <meta property="og:type" content="article">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="{{url}}">
    <style>
        :root {
            --bg: #0d0d0d;
            --text: #e5e5e5;
            --text-muted: #666;
            --accent: #e63946;
            --border: #262626;
            --card-bg: #141414;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: "SF Mono", Monaco, monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            line-height: 1.7;
            max-width: 720px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; }
        .logo span { color: var(--accent); }
        nav a { 
            color: var(--text-muted); 
            margin-left: 1.25rem; 
            font-size: 0.85rem;
        }
        nav a:hover { color: var(--text); }
        
        article { margin-bottom: 3rem; }
        
        .hook {
            background: linear-gradient(135deg, var(--card-bg) 0%, #1a1a1a 100%);
            border-left: 3px solid var(--accent);
            padding: 1.5rem;
            margin-bottom: 2rem;
            border-radius: 0 6px 6px 0;
        }
        .hook p {
            font-size: 1.25rem;
            font-weight: 500;
            line-height: 1.5;
            color: var(--text);
            margin: 0;
        }
        
        h1 { 
            font-size: 2.25rem; 
            font-weight: 700; 
            line-height: 1.2; 
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }
        .meta { 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.5rem; }
        .tag { 
            background: var(--border); 
            padding: 0.2rem 0.5rem; 
            border-radius: 3px; 
            font-size: 0.7rem; 
            color: var(--text-muted);
        }
        
        .content { margin-bottom: 3rem; }
        .content h2 { 
            font-size: 1.5rem; 
            font-weight: 600; 
            margin: 2.5rem 0 1rem; 
            letter-spacing: -0.01em;
        }
        .content h3 { 
            font-size: 1.15rem; 
            font-weight: 600; 
            margin: 2rem 0 0.75rem; 
        }
        .content p { 
            margin-bottom: 1.25rem; 
            color: #ccc;
        }
        .content ul, .content ol { 
            margin: 1rem 0 1.5rem 1.5rem; 
        }
        .content li { 
            margin-bottom: 0.5rem; 
            color: #bbb;
        }
        .content strong { color: var(--text); }
        .content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1.25rem;
            margin: 2rem 0;
            font-style: italic;
            color: var(--text);
        }
        .content hr { 
            border: none; 
            border-top: 1px solid var(--border); 
            margin: 2.5rem 0; 
        }
        .content code { 
            background: var(--border); 
            padding: 0.2rem 0.4rem; 
            border-radius: 3px; 
            font-family: var(--font-mono); 
            font-size: 0.9em;
        }
        
        .key-insight {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            border-radius: 6px;
            padding: 1.5rem;
            margin: 2rem 0;
        }
        .key-insight h4 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            margin-bottom: 0.75rem;
        }
        .key-insight p {
            font-size: 1.05rem;
            color: var(--text);
            margin: 0;
        }
        
        .related-tensions {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem 1.5rem;
            margin-top: 2rem;
        }
        .related-tensions h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        .related-tensions a {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
        }
        
        .related {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }
        .related h3 { 
            font-size: 1rem; 
            margin-bottom: 1rem;
            color: var(--text-muted);
        }
        .related a { display: block; margin-bottom: 0.75rem; }
        
        footer { 
            margin-top: 4rem; 
            padding-top: 2rem; 
            border-top: 1px solid var(--border); 
            color: var(--text-muted); 
            font-size: 0.8rem; 
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">SABLE<span>.</span></a>
        <nav>
            <a href="/phan-tich">Phân tích</a>
            <a href="/ten-xo">Bản đồ nỗi đau</a>
            <a href="/ve-he-thong">Về hệ thống</a>
        </nav>
    </header>

    <main>
        <article>
            <div class="hook">
                <p>{{excerpt}}</p>
            </div>
            
            <h1>{{title}}</h1>
            <div class="meta">
                <time>{{date}}</time>
                <div class="tags">{{tags}}</div>
            </div>
            
            <div class="content">
                {{content}}
            </div>
            
            <div class="related-tensions">
                <h4>Căng Thẳng Liên Quan</h4>
                {{related}}
            </div>
            
            <div class="related">
                <h3>Đọc Tiếp</h3>
                {{related_articles}}
            </div>
        </article>
    </main>

    <footer>
        <p>© 2026 SABLE — Giải mã thực tại hệ thống</p>
    </footer>
</body>
</html>
